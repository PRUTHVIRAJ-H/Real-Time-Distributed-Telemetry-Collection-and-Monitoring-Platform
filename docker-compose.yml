services:
  backend:
    build: ./backend
    container_name: fleetpulse-backend
    ports:
      - "5000:5000"
      - "4210:4210/udp"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: fleetpulse-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend